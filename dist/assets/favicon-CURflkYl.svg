<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c1b"/>
      <stop offset="100%" stop-color="#05020a"/>
    </linearGradient>
    
    <!-- Portal Purple to Cyan Gradient -->
    <linearGradient id="portal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded box -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />

  <!-- Portal / Vortex Circles with glowing gradients -->
  <g filter="url(#glow)" opacity="0.8">
    <circle cx="256" cy="256" r="170" fill="none" stroke="url(#portal-grad)" stroke-width="4" opacity="0.25" />
    <circle cx="256" cy="256" r="140" fill="none" stroke="url(#portal-grad)" stroke-width="6" opacity="0.4" />
    <circle cx="256" cy="256" r="110" fill="none" stroke="url(#portal-grad)" stroke-width="8" opacity="0.6" />
    <circle cx="256" cy="256" r="80" fill="none" stroke="url(#portal-grad)" stroke-width="10" opacity="0.8" />
    <circle cx="256" cy="256" r="50" fill="none" stroke="url(#portal-grad)" stroke-width="12" />
    <circle cx="256" cy="256" r="20" fill="#05020a" stroke="url(#portal-grad)" stroke-width="6" />
  </g>

  <!-- Dynamic Swirling Path to make it look like a spiral/vortex -->
  <path d="M 256 76 A 180 180 0 0 1 436 256 A 180 180 0 0 1 256 436 A 180 180 0 0 1 76 256 A 180 180 0 0 1 210 82" 
        fill="none" stroke="url(#portal-grad)" stroke-width="8" stroke-linecap="round" filter="url(#glow)" opacity="0.6"/>

  <!-- Sleek Premium Stylized White Rabbit jumping down the Rabbit Hole -->
  <g filter="url(#soft-glow)">
    <!-- Rabbit Body (Dynamic Curve) -->
    <path d="M 160 260 C 200 180, 310 180, 350 250" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" />
    
    <!-- Head -->
    <circle cx="365" cy="235" r="18" fill="#ffffff" />
    
    <!-- Ears (Sleek aerodynamic curves pointing back) -->
    <path d="M 355 222 C 330 180, 300 160, 275 170 C 265 174, 285 195, 345 220" fill="#ffffff" />
    <path d="M 360 220 C 335 170, 305 145, 280 155 C 270 159, 290 180, 350 216" fill="#ffffff" />
    
    <!-- Tail (Puff ball) -->
    <circle cx="150" cy="265" r="14" fill="#ffffff" />
    
    <!-- Front Legs (Reaching forward/down into the portal) -->
    <path d="M 365 250 L 385 285" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" />
    <path d="M 373 247 L 395 277" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.8" />
    
    <!-- Back Legs (Extended back in mid-leap) -->
    <path d="M 170 270 C 145 300, 135 310, 155 320 C 170 325, 185 300, 195 280" fill="#ffffff" />
  </g>
</svg>
